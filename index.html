<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get Started</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 52px 48px 44px;
      width: 100%;
      max-width: 480px;
      text-align: center;
      box-shadow:
        0 2px 8px rgba(0, 0, 0, 0.04),
        0 12px 40px rgba(0, 0, 0, 0.08);
    }
    .headline {
      font-size: 2rem;
      font-weight: 600;
      color: #1d1d1f;
      line-height: 1.28;
      letter-spacing: -0.015em;
      margin-bottom: 28px;
    }
    .headline .highlight {
      color: #0071e3;
      -webkit-text-fill-color: #0071e3;
    }
    .arrows {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0px;
      margin-bottom: 28px;
    }
    .arrow {
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
    }
    .arrow-1 {
      border-top: 16px solid #0071e3;
      opacity: 1;
    }
    .arrow-2 {
      border-top: 16px solid #0071e3;
      opacity: 0.55;
      margin-top: -4px;
    }
    .arrow-3 {
      border-top: 16px solid #0071e3;
      opacity: 0.25;
      margin-top: -4px;
    }
    /* Bounce animation */
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(6px); }
    }
    .arrows {
      animation: bounce 1.2s ease-in-out infinite;
    }
    .continue-btn {
      display: block;
      width: 100%;
      padding: 17px 0;
      background: #0071e3;
      color: #ffffff;
      font-size: 1.0625rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      text-transform: none;
      border: none;
      border-radius: 980px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
      text-decoration: none;
    }
    .continue-btn:hover {
      background: #0077ed;
    }
    .continue-btn:active {
      background: #006edb;
      transform: scale(0.99);
    }
    @media (max-width: 520px) {
      .card {
        margin: 20px;
        padding: 40px 28px 36px;
      }
      .headline {
        font-size: 1.65rem;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1 class="headline">
      Click here to <span class="highlight">Get<br>Started</span>
    </h1>

    <div class="arrows">
      <div class="arrow arrow-1"></div>
      <div class="arrow arrow-2"></div>
      <div class="arrow arrow-3"></div>
    </div>

    <a class="continue-btn" id="continueBtn" href="#">CONTINUE</a>
  </div>

  <script>
    // ── Source parameter capture & forward ──────────────────────────────────
    (function () {
      var DEST = 'https://apple-pay-new-lander.vercel.app/';

      function getParam(name) {
        var url   = new URL(window.location.href);
        return url.searchParams.get(name);
      }

      function buildDestURL() {
        var destURL = new URL(DEST);

        // Forward every query param from the current URL to the destination
        var params = new URL(window.location.href).searchParams;
        params.forEach(function (value, key) {
          destURL.searchParams.set(key, value);
        });

        // Ensure 'source' is explicitly set if present
        var src = getParam('source') || getParam('src') || getParam('s');
        if (src) {
          destURL.searchParams.set('source', src);
        }

        return destURL.toString();
      }

      // Set the href on the button
      var btn = document.getElementById('continueBtn');

      function updateBtn() {
        btn.href = buildDestURL();
      }

      updateBtn();

      // Also handle click as a fallback
      btn.addEventListener('click', function (e) {
        e.preventDefault();
        window.location.href = buildDestURL();
      });
    })();
  </script>

</body>
</html>
